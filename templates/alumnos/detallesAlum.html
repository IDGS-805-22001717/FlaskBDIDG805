{% extends "layout.html" %} {% block container %}
<div class="group py-32 relative overflow-x-auto sm:rounded-lg">

<div>
<div class="relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs">
    <div class="flex flex-col items-center">
        <img class="w-24 h-24 mb-6 rounded-full" 
        src="{{url_for('static',filename='img/uss.gif')}}"
        alt="Bonnie image" style="width: 100px"/>
        <h5 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
            Nombre: {{nombre}} {{apellidos}}</h5>
        <h3 class="mb-2 text-2x1 tracking-tight text-gray-900 dark: text-black">
            Correo: {{email}}
        </h3>
        <h3 class="mb-2 text-2x1 tracking-tight text-gray-900 dark: text-black">
            Telefono: {{telefono}}
        </h3>
        <span class="text-sm text-body">Alumno</span>
        <div class="flex mt-4 md:mt-6 gap-4">
            <a href="{{ url_for('alumnos.alumnos_list') }}" 
                class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 inline-flex items-center dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none">
                Regresar
            </a>
        </div>
    </div>
</div>
</div>
</div>
{% endblock %}
