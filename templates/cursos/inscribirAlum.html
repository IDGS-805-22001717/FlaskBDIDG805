{% extends "layout.html" %} 

{% block container %}
{% import "_macros.html" as macros %}

<div class="flex items-center justify-center min-h-[80vh] w-full px-4 py-10">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        
        <h2 class="text-2xl font-bold mb-8 text-gray-800 text-center">
            Inscribir Alumno
        </h2>
        
        <form method="POST" class="flex flex-col w-full">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="relative z-0 w-full mb-8 group">
            <label for="alumno_id" class="block mb-2 text-sm font-medium text-heading">Alumnos</label>
            <select name="alumno_id" id="alumno_id" required
                class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer">
                <option value="" disabled selected>Selecciona un alumno</option>
                {% for alumno in alumnos %}
                    <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="relative z-0 w-full mb-8 group">
            <label for="curso_id" class="block mb-2 text-sm font-medium text-heading">Cursos</label>
            <select name="curso_id" id="curso_id" required
                class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer">
                <option value="" disabled selected>Selecciona un curso</option>
                {% for curso in cursos %}
                    <option value="{{ curso.id }}">{{ curso.nombre }}, por: {{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

             <div class="w-full flex flex-col items-center gap-y-4">
                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-5 rounded-xl text-sm transition-all shadow-md active:scale-[0.98]">
                    Inscribir Alumno
                </button>
                <br>
                <a href="{{ url_for('cursos.cursos_list') }}" class="text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
