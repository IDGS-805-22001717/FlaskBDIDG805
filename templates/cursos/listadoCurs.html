{% extends "layout.html" %}

{% block container %}
<div class="p-4 mx-auto max-w-screen-2xl mt-10">

    <div class="relative overflow-x-auto shadow-md sm:rounded-lg border border-gray-200 bg-white">
        
        <div class="flex flex-column sm:flex-row flex-wrap space-y-4 sm:space-y-0 items-center justify-between p-5 bg-white">
            <h2 class="text-xl font-bold text-gray-900">Gestión de Cursos</h2>
            
            <a href="{{ url_for('cursos.cursos_crear') }}" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 inline-flex items-center dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                Añadir Nuevo Curso
            </a>
            <a href="{{ url_for('cursos.inscribir_alumno') }}" class="text-white bg-blue-700 hover:bg-orange-800 focus:ring-4 focus:ring-orange-300 font-medium rounded-lg text-sm px-5 py-2.5 inline-flex items-center dark:bg-orange-600 dark:hover:bg-orange-700 focus:outline-none"
            style="background: orange;">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                Añadir Alumno a un Curso
            </a>
        </div>

        <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                <tr>
                    <th scope="col" class="px-6 py-4">ID</th>
                    <th scope="col" class="px-6 py-4">Nombre</th>
                    <th scope="col" class="px-6 py-4">Descripción</th>
                    <th scope="col" class="px-6 py-4">Maestro_id</th>
                    <th scope="col" class="px-6 py-4 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for curs in cursos %}
                <tr class="bg-white border-b hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 font-bold text-gray-900">
                        #{{ curs.id }}
                    </td>
                    <td class="px-6 py-4 text-gray-900 font-medium">
                        {{ curs.nombre }}
                    </td>
                    <td class="px-6 py-4">
                        {{ curs.descripcion }}
                    </td>
                    <td class="px-6 py-4">
                        {{ curs.maestro_id }}
                    </td>
                    
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-center space-x-3">
                            <a href="{{ url_for('cursos.detalles_curso') }}?id={{ curs.id }}" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
                                Detalles
                            </a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
